<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EdgeAI · Statistical Betting Engine</title>
<style>
body{font-family:Arial;background:#0b1220;color:#fff;padding:20px}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer}
.B{background:#f59e0b}.P{background:#3b82f6}
.card{background:#111827;padding:15px;border-radius:10px;margin-bottom:15px}
</style>
</head>
<body>

<h2>EdgeAI · Value Detection Engine</h2>

<div class="card">
  <button class="B" onclick="record('B')">BANKER</button>
  <button class="P" onclick="record('P')">PLAYER</button>
</div>

<div class="card">
  <div>Prediction: <b id="pred">—</b></div>
  <div>Win Probability: <b id="wp">—</b></div>
  <div>Edge: <b id="edge">—</b></div>
  <div>Confidence: <b id="conf">—</b></div>
  <div>Stake: <b id="stake">—</b></div>
  <div>Bankroll: <b id="bank">1000</b></div>
</div>

<script>
let data = [];
let bankroll = 1000;

// ---------- STAT FUNCTIONS ----------
function entropy(arr){
  let b=0,p=0;
  arr.forEach(x=>{if(x==='B')b++;if(x==='P')p++;});
  let t=b+p;if(t===0)return 1;
  let pb=b/t, pp=p/t;
  return -(pb*Math.log2(pb||1)+pp*Math.log2(pp||1));
}

function logistic(x){return 1/(1+Math.exp(-x));}

// ---------- MODEL ----------
function predict(){
  if(data.length < 30) return {side:'SKIP',reason:'Not enough data'};

  let last = data.slice(-50);

  // RANDOMNESS CHECK
  let H = entropy(last);
  if(H > 0.98){
    return {side:'SKIP',reason:'Random detected'};
  }

  // SIMPLE SIGNALS
  let b = last.filter(x=>x==='B').length;
  let p = last.filter(x=>x==='P').length;

  let rawProb = b/(b+p);

  // CALIBRATION
  let logit = Math.log(rawProb/(1-rawProb));
  let prob = logistic(logit * 0.7);

  let side = prob > 0.5 ? 'BANKER' : 'PLAYER';
  let edge = (prob*2)-1;

  // CONFIDENCE
  let conf = Math.max(0, Math.min(80, (1-H)*80));

  if(edge < 0.03 || conf < 55){
    return {side:'SKIP',prob,edge,conf,reason:'No edge'};
  }

  let stake = bankroll * 0.01;

  return {side,prob,edge,conf,stake};
}

// ---------- GAME LOOP ----------
function record(x){
  let pred = predict();

  data.push(x);

  if(pred.side !== 'SKIP'){
    let bet = pred.side === 'BANKER' ? 'B' : 'P';
    if(bet === x){
      bankroll += pred.stake;
    } else {
      bankroll -= pred.stake;
    }
  }

  render(pred);
}

// ---------- UI ----------
function render(p){
  document.getElementById('pred').innerText = p.side || '—';
  document.getElementById('wp').innerText = p.prob ? (p.prob*100).toFixed(1)+'%' : '—';
  document.getElementById('edge').innerText = p.edge ? (p.edge*100).toFixed(1)+'%' : '—';
  document.getElementById('conf').innerText = p.conf ? p.conf+'%' : '—';
  document.getElementById('stake').innerText = p.stake ? '$'+p.stake.toFixed(2) : '—';
  document.getElementById('bank').innerText = bankroll.toFixed(2);
}
</script>

</body>
</html>
