<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TicTacAI · Perfect Prediction Engine</title>
<style>
body{background:#0b1220;color:#fff;font-family:Arial;text-align:center}
h1{margin-top:20px}
.board{display:grid;grid-template-columns:repeat(3,100px);gap:10px;justify-content:center;margin:30px}
.cell{width:100px;height:100px;background:#1f2937;font-size:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:10px}
.card{background:#111827;padding:15px;border-radius:10px;width:320px;margin:10px auto;text-align:left}
</style>
</head>
<body>

<h1>TicTacAI · Perfect Strategy Engine</h1>

<div class="board" id="board"></div>

<div class="card">
<div>AI Prediction: <b id="pred">—</b></div>
<div>Win Probability: <b id="prob">—</b></div>
<div>Confidence: <b id="conf">—</b></div>
<div>Reasoning: <b id="reason">—</b></div>
</div>

<script>
let board = ["","","","","","","","",""];
let human = "X";
let ai = "O";
let gameOver = false;

// ---------- WIN CHECK ----------
function checkWinner(b){
  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  for(let w of wins){
    if(b[w[0]] && b[w[0]]===b[w[1]] && b[w[1]]===b[w[2]]) return b[w[0]];
  }
  if(!b.includes("")) return "draw";
  return null;
}

// ---------- MINIMAX ----------
function minimax(b, depth, isMax){
  let result = checkWinner(b);
  if(result === ai) return 10 - depth;
  if(result === human) return depth - 10;
  if(result === "draw") return 0;

  if(isMax){
    let best = -Infinity;
    for(let i=0;i<9;i++){
      if(b[i]===""){
        b[i]=ai;
        best = Math.max(best, minimax(b, depth+1, false));
        b[i]="";
      }
    }
    return best;
  } else {
    let best = Infinity;
    for(let i=0;i<9;i++){
      if(b[i]===""){
        b[i]=human;
        best = Math.min(best, minimax(b, depth+1, true));
        b[i]="";
      }
    }
    return best;
  }
}

// ---------- AI DECISION ----------
function bestMove(){
  let bestScore = -Infinity;
  let move = null;
  let scores = [];

  for(let i=0;i<9;i++){
    if(board[i]===""){
      board[i]=ai;
      let score = minimax(board,0,false);
      board[i]="";
      scores.push(score);
      if(score > bestScore){
        bestScore = score;
        move = i;
      }
    }
  }

  // Probability estimation (normalized)
  let max = Math.max(...scores);
  let min = Math.min(...scores);
  let prob = (max - min) !== 0 ? (bestScore - min) / (max - min) : 0.5;

  let confidence = Math.min(100, Math.abs(bestScore)*10);

  return {
    index: move,
    prob: prob,
    confidence: confidence,
    reasoning: bestScore > 0 ? "Winning path detected"
              : bestScore < 0 ? "Defensive move (avoid loss)"
              : "Optimal draw strategy"
  };
}

// ---------- GAME ----------
function play(i){
  if(board[i]!=="" || gameOver) return;
  board[i]=human;
  render();

  if(checkWinner(board)){ endGame(); return; }

  let aiMove = bestMove();
  board[aiMove.index] = ai;
  render();

  updatePanel(aiMove);

  if(checkWinner(board)){ endGame(); }
}

// ---------- UI ----------
function render(){
  let el = document.getElementById("board");
  el.innerHTML="";
  board.forEach((v,i)=>{
    let cell = document.createElement("div");
    cell.className="cell";
    cell.innerText=v;
    cell.onclick=()=>play(i);
    el.appendChild(cell);
  });
}

function updatePanel(m){
  document.getElementById("pred").innerText = m.index;
  document.getElementById("prob").innerText = (m.prob*100).toFixed(1)+"%";
  document.getElementById("conf").innerText = m.confidence+"%";
  document.getElementById("reason").innerText = m.reasoning;
}

function endGame(){
  let res = checkWinner(board);
  gameOver = true;
  setTimeout(()=>alert(res==="draw"?"Draw":res+" wins"),200);
}

render();
</script>

</body>
</html>
