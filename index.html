<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BACCARATIQ v11 · INTUITION ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        :root {
            --bg: #020608; --bg2: #060D14; --panel: #0A1520;
            --P: #00C8FF; --B: #FF9000; --T: #8B5CF6;
            --G: #00E676; --R: #FF3355; --text: #E2E8F0;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'JetBrains Mono', monospace; margin: 0; padding: 20px; 
        }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        .card { background: var(--bg2); border: 1px solid #1A2633; padding: 20px; border-radius: 12px; }
        
        #prediction-display { 
            font-size: 2.5rem; text-align: center; padding: 40px 20px; 
            margin-bottom: 20px; border: 2px solid #1A2633; border-radius: 8px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .input-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        button { 
            padding: 20px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: 700; font-size: 1.1rem; transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .btn-p { background: var(--P); color: #000; }
        .btn-b { background: var(--B); color: #000; }
        .btn-t { background: var(--T); color: #fff; }

        .history-strip { display: flex; gap: 6px; margin-top: 20px; flex-wrap: wrap; }
        .dot { width: 14px; height: 14px; border-radius: 50%; }

        .feeling-row { margin-bottom: 15px; }
        .feeling-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: #888; }
        .meter-bg { height: 6px; background: #111; border-radius: 3px; overflow: hidden; }
        .meter-fill { height: 100%; background: var(--G); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .status-msg { margin-top: 15px; font-size: 12px; color: #555; text-align: center; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="main-panel">
        <div class="card">
            <div id="prediction-display">WAITING FOR DATA</div>
            <div class="input-group">
                <button class="btn-p" onclick="pushResult('P')">PLAYER</button>
                <button class="btn-b" onclick="pushResult('B')">BANKER</button>
                <button class="btn-t" onclick="pushResult('T')">TIE</button>
            </div>
            <div class="status-msg" id="status">Input 5 rounds to activate Intuition Logic</div>
            <div class="history-strip" id="history"></div>
        </div>
    </div>

    <div class="side-panel">
        <div class="card">
            <h3 style="margin-top:0; font-size: 14px; color: var(--G);">ENGINE FEELING</h3>
            <div id="feelings-container"></div>
            <hr style="border: 0; border-top: 1px solid #1A2633; margin: 20px 0;">
            <div id="stats" style="font-size: 12px; line-height: 1.8;">
                Trend Velocity: <span id="vel-val">0.0</span><br>
                Confidence: <span id="conf-val">0%</span>
            </div>
        </div>
    </div>
</div>

<script>
    // CORE ENGINE STATE
    const S = {
        outcomes: [],
        history: [], // {pred, actual, models: {}}
        weights: { markov: 1.0, pattern: 1.0, momentum: 1.0, bayes: 1.0 },
        models: ['markov', 'pattern', 'momentum', 'bayes'],
        config: { threshold: 52 }
    };

    function pushResult(val) {
        S.outcomes.push(val);
        if (S.history.length > 0) {
            updateWeights(val);
        }
        renderUI();
        runEngine();
    }

    function updateWeights(actual) {
        // Look back at the last prediction and see which models were "feeling" it
        const lastBatch = S.history[S.history.length - 1].modelVotes;
        S.models.forEach(m => {
            if (lastBatch[m] === actual) {
                S.weights[m] = Math.min(S.weights[m] + 0.15, 2.0); // Reward
            } else {
                S.weights[m] = Math.max(S.weights[m] - 0.1, 0.5);  // Penalize
            }
        });
    }

    function runEngine() {
        if (S.outcomes.length < 5) return;

        // 1. Run Models
        const votes = {
            markov: S.outcomes[S.outcomes.length-1] === 'P' ? 'B' : 'P',
            pattern: detectPattern(),
            momentum: S.outcomes.slice(-2).every(x => x === S.outcomes[S.outcomes.length-1]) ? S.outcomes[S.outcomes.length-1] : 'P',
            bayes: getBayes()
        };

        // 2. Aggregate with Weighting (Intuition)
        let pWeight = 0, bWeight = 0;
        S.models.forEach(m => {
            if (votes[m] === 'P') pWeight += S.weights[m];
            if (votes[m] === 'B') bWeight += S.weights[m];
        });

        const totalWeight = pWeight + bWeight;
        const conf = (Math.max(pWeight, bWeight) / totalWeight) * 100;
        const side = pWeight > bWeight ? 'P' : 'B';

        // 3. Fast Trend Snap
        const last3 = S.outcomes.slice(-3).filter(x => x !== 'T');
        const isSnap = last3.length === 3 && last3.every(x => x === side);
        
        let finalDecision = 'SKIP';
        if (conf > S.config.threshold || isSnap) finalDecision = side;

        // 4. Update UI
        const display = document.getElementById('prediction-display');
        display.textContent = finalDecision === 'SKIP' ? '--- SKIP ---' : (finalDecision === 'P' ? 'BET PLAYER' : 'BET BANKER');
        display.style.color = finalDecision === 'P' ? 'var(--P)' : (finalDecision === 'B' ? 'var(--B)' : '#444');
        
        document.getElementById('conf-val').textContent = conf.toFixed(1) + '%';
        document.getElementById('vel-val').textContent = isSnap ? 'HIGH (Snap)' : 'NORMAL';

        // Save for next round comparison
        S.history.push({ pred: finalDecision, modelVotes: votes });
    }

    function detectPattern() {
        const str = S.outcomes.slice(-3).join('');
        return str === 'PBP' ? 'B' : (str === 'BPB' ? 'P' : S.outcomes[S.outcomes.length-1]);
    }

    function getBayes() {
        const p = S.outcomes.filter(x => x === 'P').length;
        const b = S.outcomes.filter(x => x === 'B').length;
        return p > b ? 'B' : 'P'; // Betting on regression
    }

    function renderUI() {
        // Render Dots
        const hist = document.getElementById('history');
        hist.innerHTML = S.outcomes.map(o => `<div class="dot" style="background:var(--${o})"></div>`).join('');

        // Render Feeling Meters
        const feel = document.getElementById('feelings-container');
        feel.innerHTML = S.models.map(m => `
            <div class="feeling-row">
                <div class="feeling-label"><span>${m.toUpperCase()}</span><span>${(S.weights[m]*100).toFixed(0)}%</span></div>
                <div class="meter-bg"><div class="meter-fill" style="width:${S.weights[m]*50}%"></div></div>
            </div>
        `).join('');

        document.getElementById('status').textContent = `Round #${S.outcomes.length} Processed`;
    }
</script>

</body>
</html>
