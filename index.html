const PRIOR={B:0.4585,P:0.4460,T:0.0955};
const ODDS_P=2.00, ODDS_B=1.95;

// S.config now defaults to a safer 58% threshold to filter the losses you saw
let S={
  outcomes:[],bets:[],bankroll:1000,startBank:1000,equity:[],
  w3h:[],w5h:[],w10h:[],
  config:{confThreshold:58,fixedStakePct:1.5,secureMode:true,allowBanker:true,rideStreaks:true,detectReversals:true,reactSpeed:2},
  halted:false,lastDecision:null,pendingBet:null,
  stats:{bets:0,won:0,lost:0,skipped:0,totalStaked:0,totalPnl:0,bestStreak:0,curStreak:0,pbets:0,bbets:0,pwins:0,bwins:0},
  modelAcc:{mk:[],pm:[],sc:[],by:[],mo:[],dv:[],rv:[]}
};

// FIXED DECISION ENGINE
function computeDecision(){
  if(S.outcomes.length<8) return {side:'SKIP',reasoning:[{t:'S',txt:'Need 8+ rounds of data'}]};

  const mk=mMarkov(S.outcomes), pm=mPattern(S.outcomes), sc=mStreak(S.outcomes);
  const by=mBayes(S.outcomes), mo=mMomentum(S.outcomes), dv=mDeviation(S.outcomes), rv=mReversal(S.outcomes);
  
  const models={mk,pm,sc,by,mo,dv,rv};
  let vP=0, vB=0, sumConf=0;

  // Weighted Voting
  MK.forEach(k=>{
    const m=models[k];
    if(m.vote==='P'){vP++; sumConf+=m.conf;}
    else if(m.vote==='B'){vB++; sumConf+=m.conf;}
  });

  const winner=vP>=vB?'P':'B';
  const agree=winner==='P'?vP:vB;
  let conf=sumConf/7;

  // NEW: Hard Reversal Filter (Fixes your -$20.00 loss clusters)
  const rev=reversalDetector(S.outcomes);
  if(rev.risk > 65 && rev.side === winner) {
    conf -= 25; // Force skip on exhausted streaks
  }

  // NEW: Chop Filter
  const last10 = S.outcomes.slice(-10).filter(x=>x!=='T');
  let swaps = 0;
  for(let i=1;i<last10.length;i++) if(last10[i]!==last10[i-1]) swaps++;
  const chopScore = swaps/(last10.length-1 || 1);
  
  let currentThresh = S.config.confThreshold;
  if(chopScore > 0.7) currentThresh += 5; // Raise bar during "ping-pong" shoes

  let side = 'SKIP';
  // Must have 5/7 models agree or 4/7 with very high confidence
  if(conf >= currentThresh && agree >= 4) {
    side = winner;
  }

  // Calculate Stake based on updated Bankroll
  const stake = side!=='SKIP' ? Math.floor(S.bankroll * (S.config.fixedStakePct/100)) : 0;

  return {side, confidence:conf, stake, winner, signals:agree, chopScore, revRisk:rev.risk};
}
