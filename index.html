<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BACCARATIQ v10 · INTUITION</title>
<style>
    /* Using your established dark-grid aesthetic */
    :root {
        --bg: #020608; --bg2: #060D14; --P: #00C8FF; --B: #FF9000; 
        --G: #00E676; --R: #FF3355; --T: #8B5CF6;
    }
    body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; margin: 0; padding: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
    .card { background: var(--bg2); border: 1px solid #1A2633; padding: 15px; border-radius: 8px; }
    .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
    button { flex: 1; padding: 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1.2em; }
    .btn-p { background: var(--P); color: #000; }
    .btn-b { background: var(--B); color: #000; }
    .btn-t { background: var(--T); color: #fff; }
    #prediction-box { font-size: 2em; text-align: center; padding: 20px; margin: 10px 0; border: 2px dashed #333; }
    .feeling-meter { height: 4px; background: #111; margin-top: 5px; position: relative; }
    .feeling-fill { height: 100%; background: var(--G); transition: width 0.3s; }
    .log { font-size: 0.8em; color: #666; max-height: 200px; overflow-y: auto; }
</style>
</head>
<body>

<div class="grid">
    <div class="main">
        <div class="card">
            <div id="prediction-box">AWAITING DATA...</div>
            <div class="btn-group">
                <button class="btn-p" onclick="addResult('P')">PLAYER</button>
                <button class="btn-b" onclick="addResult('B')">BANKER</button>
                <button class="btn-t" onclick="addResult('T')">TIE</button>
            </div>
            <div id="status-bar" style="color: #888;">Input the last 5 results to prime the Intuition Engine.</div>
        </div>
        
        <div class="card" style="margin-top:20px">
            <h4>History Analysis</h4>
            <div id="history-row" style="display:flex; gap:5px; flex-wrap:wrap"></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="card">
            <h4>Model "Feeling"</h4>
            <div id="model-feelings">
                </div>
        </div>
        <div class="card" style="margin-top:20px">
            <h4>Engine Logs</h4>
            <div id="log" class="log"></div>
        </div>
    </div>
</div>

<script>
let state = {
    outcomes: [],
    weights: { markov: 1.0, pattern: 1.0, momentum: 1.0, bayes: 1.0 },
    history: [], // Tracks {prediction, actual}
    config: { threshold: 52, reactSpeed: 4 }
};

const MK = ['markov', 'pattern', 'momentum', 'bayes'];

function addResult(val) {
    state.outcomes.push(val);
    updateModelWeights(); // Analyse past results to adjust "feeling"
    renderHistory();
    processPrediction();
}

// THE INTUITION LOOP: Adjusts weights based on what is CURRENTLY working
function updateModelWeights() {
    if (state.history.length === 0) return;
    
    MK.forEach(m => {
        const last3 = state.history.slice(-3);
        let winCount = 0;
        last3.forEach(h => {
            if (h.votes[m] === state.outcomes[state.outcomes.length-1]) winCount++;
        });

        // Boost hot models, crush failing ones
        if (winCount >= 2) state.weights[m] = 1.6;
        else if (winCount === 0) state.weights[m] = 0.6;
        else state.weights[m] = 1.0;
    });
    renderFeelings();
}

function processPrediction() {
    if (state.outcomes.length < 5) return;

    const results = {
        markov: runMarkov(),
        pattern: runPattern(),
        momentum: runMomentum(),
        bayes: runBayes()
    };

    let pScore = 0;
    let bScore = 0;

    MK.forEach(m => {
        if (results[m].side === 'P') pScore += (results[m].conf * state.weights[m]);
        if (results[m].side === 'B') bScore += (results[m].conf * state.weights[m]);
    });

    // FAST TREND DETECTION (Snap)
    const w3 = state.outcomes.slice(-3).filter(x => x !== 'T');
    const isStreak = w3.every(x => x === w3[0]);
    
    let decision = 'SKIP';
    let finalConf = Math.max(pScore, bScore) / 4;
    let side = pScore > bScore ? 'P' : 'B';

    // If a streak is starting (3 in a row), boost confidence to "Snap" in
    if (isStreak && side === w3[0]) finalConf += 15;
    
    // If a trend is "Decaying" (Confidence dropping compared to previous), Force Skip
    if (finalConf >= state.config.threshold) {
        decision = side;
    }

    const box = document.getElementById('prediction-box');
    box.textContent = decision === 'SKIP' ? '--- SKIP ---' : (decision === 'P' ? 'BET PLAYER' : 'BET BANKER');
    box.style.color = decision === 'P' ? 'var(--P)' : (decision === 'B' ? 'var(--B)' : '#444');

    // Store for next adjustment
    state.history.push({ votes: {
        markov: results.markov.side,
        pattern: results.pattern.side,
        momentum: results.momentum.side,
        bayes: results.bayes.side
    }});
}

// SIMPLIFIED CORE MODELS (Intuition Versions)
function runMarkov() {
    const last = state.outcomes[state.outcomes.length-1];
    return { side: last === 'P' ? 'B' : 'P', conf: 55 }; // Simple transition
}

function runPattern() {
    const s = state.outcomes.join('').slice(-4);
    if (s.includes('PPB') || s.includes('BBP')) return { side: s.endsWith('P') ? 'P' : 'B', conf: 60 };
    return { side: 'P', conf: 45 };
}

function runMomentum() {
    const last2 = state.outcomes.slice(-2);
    return { side: last2[0] === last2[1] ? last2[0] : 'SKIP', conf: 65 };
}

function runBayes() {
    const counts = { P: 0, B: 0 };
    state.outcomes.forEach(x => counts[x]++);
    return { side: counts.P > counts.B ? 'B' : 'P', conf: 52 };
}

// UI HELPERS
function renderFeelings() {
    const container = document.getElementById('model-feelings');
    container.innerHTML = MK.map(m => `
        <div style="margin-bottom:10px">
            <div style="display:flex; justify-content:space-between; font-size:10px">
                <span>${m.toUpperCase()}</span>
                <span>${(state.weights[m]*100).toFixed(0)}% Power</span>
            </div>
            <div class="feeling-meter">
                <div class="feeling-fill" style="width: ${state.weights[m]*50}%"></div>
            </div>
        </div>
    `).join('');
}

function renderHistory() {
    const row = document.getElementById('history-row');
    row.innerHTML = state.outcomes.map(o => `
        <div style="width:20px; height:20px; border-radius:50%; background:var(--${o}); display:flex; align-items:center; justify-content:center; font-size:10px; color:#000; font-weight:bold">${o}</div>
    `).join('');
}
</script>
</body>
</html>
